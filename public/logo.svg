<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fffbeb" />
      <stop offset="100%" stop-color="#fef3c7" />
    </linearGradient>
    <radialGradient id="bg-radial-dark" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#090d16" />
    </radialGradient>
    <linearGradient id="ring-light-grad" x1="80%" y1="0%" x2="20%" y2="100%">
      <stop offset="0%" stop-color="#fde047" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>
    <linearGradient id="ring-bottom-grad" x1="10%" y1="50%" x2="90%" y2="50%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#f97316" />
    </linearGradient>
    <linearGradient id="ring-dark-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#451a03" />
      <stop offset="100%" stop-color="#1c0d02" />
    </linearGradient>
    <linearGradient id="wave-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="85%" stop-color="#c2410c" />
    </linearGradient>
    <filter id="wave-shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="5" stdDeviation="6" flood-color="#0d3c66" flood-opacity="0.2" />
    </filter>
    <filter id="emblem-shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#1e293b" flood-opacity="0.08" />
    </filter>
  </defs>
  <rect id="svg-background-rect" width="500" height="500" fill="url(#bg-radial-dark)" rx="24" />
  <g id="logo-content" transform="translate(-8, -26)">
    <g id="emblem-group" filter="url(#emblem-shadow)" transform="translate(0, 40)">
      <g id="outer-rings">
        <path id="ring-crescent-top-left" d="M 324,142 C 248,110 148,162 148,245 C 148,295 180,325 212,338 C 205,322 196,298 200,265 C 206,218 245,178 300,166 C 314,162 322,154 324,142 Z" fill="url(#ring-light-grad)" opacity="0.95" />
        <path id="ring-crescent-bottom" d="M 200,325 C 235,352 288,348 322,324 C 298,328 268,324 242,302 C 228,290 216,278 205,262 C 200,285 198,308 200,325 Z" fill="url(#ring-bottom-grad)" opacity="0.85" />
      </g>
      <g id="dark-gauge-accent">
        <path id="gauge-stem" d="M 238,314 C 275,308 312,284 328,248 C 334,235 338,222 342,211 C 332,228 318,248 285,268 C 265,280 252,292 238,314 Z" fill="url(#ring-dark-grad)" />
        <circle id="gauge-pin-outer" cx="343" cy="210" r="15" fill="#1c0d02" />
        <circle id="gauge-pin-ring" cx="343" cy="210" r="11" fill="none" stroke="#fbbf24" strokeWidth="2.5" />
        <circle id="gauge-pin-dot" cx="343" cy="210" r="4.5" fill="#fbbf24" />
      </g>
      <path id="trend-wave-arrow" d="M 128,276 C 158,292 182,274 200,244 L 225,202 C 238,181 254,181 267,196 L 283,214 C 299,232 316,232 334,206 L 364,156 L 350,150 L 382,120 L 380,165 L 368,150 L 338,200 C 320,230 300,230 282,210 L 265,192 C 248,172 232,172 217,194 L 190,234 C 171,262 151,277 128,276 Z" fill="url(#wave-grad)" filter="url(#wave-shadow)" />
    </g>
  </g>
</svg>